<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceIQ — Conversation Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/static/style.css">

</head>

<body>
<div class="wrapper">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-dot"></div>
      Voice<span>IQ</span>
    </div>
    <button class="theme-btn" onclick="toggleTheme()">☀ Light / Dark</button>
  </div>

  <!-- UPLOAD CARD -->
  <div class="upload-card fade-in">
    <div class="upload-title">Conversation Intelligence</div>
    <div class="upload-sub">Upload your meeting audio and get deep speaker analytics powered by AI</div>

    <form id="uploadForm" action="{{ url_for('upload_file') }}" method="POST" enctype="multipart/form-data">
      <div class="form-row">
        <div class="field-group">
          <span class="field-label">Audio File</span>
          <input type="file" class="field-input" name="file" accept=".wav,.mp3,.m4a" required>
        </div>
        <div class="field-group">
          <span class="field-label">Meeting Topic</span>
          <input type="text" class="field-input" name="topic" placeholder="e.g. Q4 Sales Review" required>
        </div>
        <div class="field-group">
          <span class="field-label">Speakers</span>
          <input type="number" class="field-input" name="num_speakers" min="2" max="20" placeholder="Auto" style="width:120px">
        </div>
        <button type="submit" class="analyze-btn">⚡ Analyze</button>
      </div>
    </form>
  </div>

  <!-- RESULTS -->
  <div id="resultSection"></div>

</div><!-- wrapper -->

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/script.js"></script>
</body>
</html>
